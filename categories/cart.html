<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Shopping Cart</h1>

<a href="index.html">← Continue Shopping</a>

<div id="cartItems"></div>

<h2 id="cartTotal"></h2>

<button onclick="clearCart()">
Clear Cart
</button>

<button onclick="goCheckout()">
Checkout
</button>

<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let html = "";

let total = 0;

cart.forEach(item => {

html += `
<div>
<h3>${item.name}</h3>
<p>¥${item.price}</p>
</div>
`;

total += item.price;

});

document.getElementById(
"cartItems"
).innerHTML = html;

document.getElementById(
"cartTotal"
).innerHTML =
"Total: ¥" + total;

function clearCart(){

localStorage.removeItem(
"cart"
);

location.reload();

}

function goCheckout(){

window.location.href =
"checkout.html";

}

</script>

</body>
</html>
