<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Checkout</h1>

<h2>Your Order</h2>

<div id="orderSummary"></div>

<h3 id="orderTotal"></h3>

<hr>

<form>

<p>
<label>Name</label><br>
<input type="text" id="name" required>
</p>

<p>
<label>Phone</label><br>
<input type="text" id="phone" required>
</p>

<p>
<label>Email</label><br>
<input type="email" id="email">
</p>

<p>
<label>Address</label><br>
<textarea id="address"></textarea>
</p>

<button type="button" onclick="submitOrder()">
Place Order
</button>

</form>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

// DISPLAY CART (FIXED)
cart.forEach(item => {

let itemTotal = item.price * item.qty;

html += `
<p>
${item.name} × ${item.qty} = ¥${itemTotal}
</p>
`;

total += itemTotal;

});

document.getElementById("orderSummary").innerHTML = html;
document.getElementById("orderTotal").innerHTML = "Total: ¥" + total;

// SUBMIT ORDER
function submitOrder(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

let orderNumber = "ORD" + Date.now();

let order = {
orderNumber: orderNumber,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,

// KEEP STRUCTURE FOR GOOGLE SHEET
items: JSON.stringify(cart),

total: total,
date: new Date().toLocaleString()
};

// SEND TO GOOGLE SHEETS (FIXED URL REQUIRED)
fetch("https://script.google.com/macros/s/AKfycbxL1aNFWUU7KBsdrH4cQMtLu_ORljcNSAqADIsH1mV_qLZZEtTyAkfWhvTdYaxqR4aMzQ/exec", {
method: "POST",
body: JSON.stringify(order)
})
.then(res => res.text())
.then(data => {

// SAVE LOCAL BACKUP
localStorage.setItem("lastOrder", JSON.stringify(order));
localStorage.setItem("lastOrderNumber", orderNumber);

// CLEAR CART
localStorage.removeItem("cart");

// REDIRECT
window.location.href = "success.html";

})
.catch(err => {
alert("Order failed. Check script.");
console.log(err);
});

}

</script>

</body>
</html>
