<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Checkout</h1>

<h2>Your Order</h2>

<div id="orderSummary"></div>

<h3 id="orderTotal"></h3>

<hr>

<form id="checkoutForm">

<p>
<label>Name</label><br>
<input type="text" id="name" required>
</p>

<p>
<label>Phone</label><br>
<input type="text" id="phone" required>
</p>

<p>
<label>Email</label><br>
<input type="email" id="email">
</p>

<p>
<label>Address</label><br>
<textarea id="address"></textarea>
</p>

<button type="button" onclick="submitOrder()">
Place Order
</button>

</form>

<script>

// Load cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

// Show cart
cart.forEach(item => {
html += `<p>${item.name} - ¥${item.price}</p>`;
total += Number(item.price);
});

document.getElementById("orderSummary").innerHTML = html;
document.getElementById("orderTotal").innerHTML = "Total: ¥" + total;

// Submit order
function submitOrder(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

// generate order number
let orderNumber = "ORD" + Date.now();

// create order object
let order = {
orderNumber: orderNumber,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,
items: JSON.stringify(cart),
total: total,
date: new Date().toLocaleString()
};

// STEP 1: send to Google Sheets
fetch("https://script.google.com/macros/s/AKfycbwB8jFUe-QwwVhhbHr2sJi7aQyL_OIIoOZA9MCuQi15jQdfyW_O8F5LpRCQb-NfML6a5Q/exec", {
method: "POST",
body: JSON.stringify(order)
})
.then(response => response.text())
.then(data => {

// STEP 2: local storage backup
localStorage.setItem("lastOrder", JSON.stringify(order));
localStorage.setItem("lastOrderNumber", orderNumber);

// STEP 3: clear cart
localStorage.removeItem("cart");

// STEP 4: go to success page
window.location.href = "success.html";

})
.catch(error => {
alert("Error sending order. Check internet or script.");
console.log(error);
});

}

</script>

</body>
</html>
