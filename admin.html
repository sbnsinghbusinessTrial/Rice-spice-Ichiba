<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body { font-family: Arial; display: flex; gap: 20px; padding: 20px; }
.box { width: 50%; border: 1px solid #ccc; padding: 10px; height: 90vh; overflow:auto; }
.order { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
.order:hover { background:#f5f5f5; }
</style>
</head>

<body>

<div class="box">
<h2>Orders</h2>
<div id="orders"></div>
</div>

<div class="box">
<h2>Order Details</h2>
<div id="details"></div>
</div>

<script>

let API_URL = "https://script.google.com/macros/s/AKfycbxL1aNFWUU7KBsdrH4cQMtLu_ORljcNSAqADIsH1mV_qLZZEtTyAkfWhvTdYaxqR4aMzQ/exec";

let allOrders = [];
let allItems = [];

fetch(API_URL)
.then(res => res.json())
.then(data => {

allOrders = data.orders;
allItems = data.items;

showOrders();

});

function showOrders() {

let div = document.getElementById("orders");
div.innerHTML = "";

allOrders.forEach(order => {

let el = document.createElement("div");
el.className = "order";

el.innerHTML = `
<b>${order.orderNumber}</b><br>
${order.name}<br>
¥${order.total}
`;

el.onclick = () => showDetails(order);

div.appendChild(el);

});

}

function showDetails(order) {

let items = allItems.filter(i => i.orderNumber === order.orderNumber);

let html = `
<h3>${order.orderNumber}</h3>
<p><b>Name:</b> ${order.name}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Email:</b> ${order.email}</p>
<p><b>Address:</b> ${order.address}</p>
<hr>
<h4>Items</h4>
`;

items.forEach(i => {
html += `<p>${i.name} - ¥${i.price} x ${i.qty || 1}</p>`;
});

html += `<hr><h3>Total: ¥${order.total}</h3>`;

document.getElementById("details").innerHTML = html;

}

</script>

</body>
</html>
